spring:
  application:
    name: autocart
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # Options: none, update, create, create-drop, validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

auto-cart:
  jwt:
    base64-secret: ${JWT_BASE64_SECRET}
    access-token-validity-in-seconds: 86400
    refresh-token-validity-in-seconds: 864000

