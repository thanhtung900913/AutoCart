  jobmanager:
    image: autocart/flink:1.18.1
    container_name: flink_jobmanager
    restart: unless-stopped
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        rest.port: 8081
        parallelism.default: 1
    volumes:
      - ./data/checkpoints:/opt/flink/checkpoints
      - ./data/savepoints:/opt/flink/savepoints
      - ./config/flink-jobs/target:/opt/flink/usrlib
    networks:
      - cdc_global_network

  taskmanager:
    image: autocart/flink:1.18.1
    container_name: flink_taskmanager
    restart: unless-stopped
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      CLICKHOUSE_URL: ${CLICKHOUSE_URL}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 1
    volumes:
      - ./data/checkpoints:/opt/flink/checkpoints
      - ./data/savepoints:/opt/flink/savepoints
      - ./config/flink-jobs/target:/opt/flink/usrlib
    networks:
      - cdc_global_network

networks:
  cdc_global_network:
    external: true
